services:
  - type: web
    name: randahaws-backend
    runtime: python
    repo: https://github.com/MuhammadHaider1/Heels-E-commerce-store
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install -r backend/requirements.txt && cd backend && python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: USE_POSTGRES
        value: "True"
      - key: DB_NAME
        fromDatabase:
          name: randahaws-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: randahaws-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: randahaws-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: randahaws-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: randahaws-db
          property: port
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EASYPAISA_NUMBER
        sync: false
      - key: JAZZCASH_NUMBER
        sync: false
      - key: SITE_URL
        sync: false

databases:
  - name: randahaws-db
    plan: free
    region: singapore
    databaseName: randahaws
